# Settings for Firebase App Hosting
# This file configures the Next.js framework runtime environment.
# Learn more: https://firebase.google.com/docs/app-hosting/configure

# Configure the Cloud Run container resources for App Hosting
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables and secrets for Next.js App Router runtime
environmentVariables:
  - variable: APP_URL
    value: "https://your-custom-domain.com" # Canlı alan adınızı buraya yazabilirsiniz veya Firebase Console'dan değiştirebilirsiniz

# Secrets managed securely by Cloud Secret Manager via Firebase App Hosting
# Firebase App Hosting kurulumunda bu secret'ı kolayca oluşturabilir veya bağlayabilirsiniz.
secrets:
  - variable: GEMINI_API_KEY
    secret: gemini-api-key
